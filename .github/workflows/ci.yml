name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test
      # Vite production build peaks above Node's default ~2GB heap on ubuntu-latest (OOM during chunk render).
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
